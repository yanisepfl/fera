[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.26"
evm_version = "cancun"          # Robinhood Chain = Arbitrum Orbit (Cancun-equivalent, tstore/tload for v4 flash accounting)
optimizer = true
# v4-core `Pool.swap` only compiles under via_ir with a very high optimizer_runs (canonical v4
# value). At low runs (e.g. 800/200) the Yul backend throws "Variable is 1 too deep in the stack"
# once the concrete PoolManager is pulled into a build (integration tests). Matching v4-core here is
# required for ANY test/script that compiles the PoolManager. Runtime-gas impact is favorable.
optimizer_runs = 44444444
via_ir = true                   # required: 8-field §6 Swap event + v4 flash-accounting locals overflow the legacy stack
bytecode_hash = "none"
ffi = false
# Gas snapshots: hook beforeSwap+afterSwap combined budget <= 40k (MASTER_SPEC §5). CI reports.
gas_reports = ["FeraHook"]
fs_permissions = [{ access = "read", path = "./" }]
remappings = [
    # populated by remappings.txt; kept here empty so `forge remappings` is authoritative
]

# Money-path files demand 100% branch coverage (SHARED_CONTEXT eng rules). CI enforces.
# NOTE: optimizer_runs is NOT lowered here — the concrete v4 PoolManager compiled by integration
# tests requires the high default (see comment above). Overriding it low reintroduces the Yul
# stack-too-deep. Coverage is run via `forge coverage --ir-minimum` (see .github/workflows).
[profile.ci]
verbosity = 3

# forge-lint runs as part of `forge build` (forge >=1.6). Scope it to the money-path source and
# drop three categories that fire pervasively on REVIEWED, intentional patterns — never on a real
# defect — so the build stays near-silent without changing any money-path logic (COV/cleanliness
# pass). Correctness lints (divide-before-multiply, unchecked-call, erc20-unchecked-transfer,
# unused-import, ...) stay ACTIVE on src so genuine regressions still surface.
#   * unsafe-typecast   — the v4 flash-accounting int128/uint128 delta math + saturating casts, each
#                         bounded by construction or an explicit sat-guard (FeraHook._satAdd/_positive,
#                         FeraVault._resolveDelta, FeeLogic downcasts after clamp). Not defects.
#   * block-timestamp   — epoch clocks, cooldowns, market-hours, JIT windows: design-inherent. Same
#                         posture as the accepted slither `timestamp` triage (security/07-slither-triage.md).
#   * incorrect-shift   — false positive on the idiomatic `1 << kind` claim bitmask (Distributor).
# test/** + script/** are ignored for lint (style noise there is not a release gate); their two genuine
# solc state-mutability warnings were fixed in-place, not suppressed.
[lint]
ignore = ["test/**/*.sol", "script/**/*.sol", "lib/**"]
exclude_lints = ["unsafe-typecast", "block-timestamp", "incorrect-shift"]

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"
number_underscore = "thousands"

# ─────────────────────────────────────────────────────────────────────────────────────────────
# FORMAL VERIFICATION — solc built-in SMTChecker (Agent 6 / security depth pass).
# Engine: CHC (Constrained Horn Clauses — unbounded, inductive) with the z3 solver that is BUNDLED
# in the foundry svm solc 0.8.26 build (verified: `--model-checker-engine chc` proves VCs safe with
# NO external install; z3 is also on PATH at /usr/local/bin/z3). Targets the money-path arithmetic:
# proves assert / overflow / divByZero on the small self-contained value contracts (RevenueDistributor
# 50/25/25 split, Distributor R-19 cap, EmissionsController INV-7 envelope, EsFera INV-9 conservation).
#   Run:  FOUNDRY_PROFILE=smt forge build
# The per-query `timeout` bounds wall-clock (ANTI-HANG). FeraVault/FeraHook are intentionally EXCLUDED:
# they route every value move through v4 `poolManager.unlock` external calls + inline assembly, which
# CHC models as havoc — the checker would emit only noise, so those paths are covered by the symbolic
# `test/formal/*.t.sol` (Halmos) proofs + the stateful invariants instead.
# CHC (unbounded, inductive) over the LOOP-FREE money contracts — terminates in seconds and PROVES
# the division-by-zero + envelope/cap assertions safe. `forge build` under this profile exits 0
# (SMTChecker findings are warnings). EsFera has a `while` loop (`_consumeLocked`) that makes CHC's
# fixpoint non-terminating under a wall-clock bound, so it is checked with the BMC engine instead —
# see `[profile.smtbmc]` below and `security/hardening/03-formal-verification.md` for the direct-solc
# reproducer that captured the recorded results.
[profile.smt]
src = "src"
[profile.smt.model_checker]
engine = "chc"
targets = ["assert", "overflow", "divByZero"]
timeout = 3000            # per-SMT-query wall-clock (ms) — bounds the run (ANTI-HANG)
show_unproved = true
div_mod_no_slacks = false
contracts = { "src/RevenueDistributor.sol" = [
    "RevenueDistributor",
], "src/Distributor.sol" = [
    "Distributor",
], "src/EmissionsController.sol" = [
    "EmissionsController",
] }

# BMC (bounded, always-terminating) for the looping EsFera — proves the vest/forfeit arithmetic
# straight-line-safe. Run: FOUNDRY_PROFILE=smtbmc forge build
[profile.smtbmc]
src = "src"
[profile.smtbmc.model_checker]
engine = "bmc"
targets = ["assert", "overflow", "divByZero"]
timeout = 3000
show_unproved = true
contracts = { "src/EsFera.sol" = ["EsFera"] }

[fuzz]
runs = 512
max_test_rejects = 100_000

[invariant]
runs = 256
depth = 64
fail_on_revert = false
call_override = false

