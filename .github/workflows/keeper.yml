# FERA vault-strategy keeper — free runner (GitHub Actions cron).
#
# STILL PAUSED 2026-07-21 (fix landed in source, NOT yet live on-chain): the adversarial audit's
# Finding 1 (cross-contract PoolManager reentrancy — a hostile native token's transfer() hook,
# fired mid-callback by the vault's own take()/settle(), could reenter PoolManager.swap() and move
# spot before a swap-free callback's fresh getSlot0() read) is FIXED and TEST-PROVEN in source:
#   1. `keeperActive` (FeraVault.sol) — a new per-pool, owner-only allowlist gating EVERY onlyKeeper
#      action; defaults FALSE for every pool, including the 8 already-live ones.
#   2. A TWAP-deviation POST-check (mirroring the pre-existing pre-check) added to rebalanceLimit,
#      rebalanceBase, rebalanceRwaOracle, defendRwaOffHours — re-verified AFTER the callback returns,
#      so a mid-callback manipulation reverts the WHOLE transaction instead of completing on a
#      manipulated final state.
#   PoC: test/security/BaseLimitReaudit_PoC.t.sol#test_A7_crossContractReentrancy_... (a hostile
#   reentrant-token mock genuinely reenters PoolManager.swap() and moves price; the protected path
#   reverts TwapOutOfBand). Full suite: 359/359 passing; slither clean (0 new High/Critical).
#
# NONE OF THIS IS LIVE YET — the currently-deployed vault has neither fix. Re-enabling this cron
# right now would resume calling the OLD, still-vulnerable contract. Sequence before re-enabling:
#   1. Redeploy the vault (this fix requires new bytecode — cannot be applied in place).
#   2. Timelock Safe calls `setKeeperActive(id, true)` for each of the 8 live pools on the NEW vault
#      (only after reviewing each pool's native token isn't a hostile transfer-hook contract).
#   3. Point backend/keepers/vaultStrategy.ts (and this workflow's target address, if hardcoded
#      anywhere) at the NEW vault address.
#   4. Only then uncomment the `schedule:` trigger below.
# Manual runs (workflow_dispatch) still target whatever vault address the backend is currently
# configured for — check that config before dispatching manually.
#
# Every ~30 min (WHEN ENABLED): discovers the pools on-chain, then per seeded tranche
#   - recenters the base band ONLY if price has left it (position stopped earning)
#   - builds the idle reserve + deploys the limit band where one is missing
# Every action is SIMULATED first and sent only if the simulation succeeds, so a calm
# tick costs zero gas. Fail-static: a missed or late run just means positions hold.
#
# Setup (one-time), repo → Settings → Secrets and variables → Actions:
#   KEEPER_PRIVATE_KEY  = the FERA_VAULT_KEEPER hot key (bounded on-chain by design)
#   RPC_URL             = Alchemy Robinhood-Chain URL (recommended; falls back to public)
# Without KEEPER_PRIVATE_KEY the job still runs and logs what it WOULD do (dry run).
name: FERA keeper

on:
  # schedule:                    # STILL PAUSED — see note above. The fix is code-complete and
  #   - cron: "0 * * * *"        # test-proven, but only takes effect after the vault is redeployed
  #                              # and setKeeperActive is called for the live pools (steps above).
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: fera-keeper
  cancel-in-progress: false

jobs:
  keeper:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      # The keeper needs WIDE address-scoped eth_getLogs (pool discovery + band
      # reconstruction). Free-tier RPC plans often cap getLogs at tiny block ranges, so
      # probe the secret endpoint's capability and fall back to the public RPC if it fails.
      - name: Resolve RPC
        id: rpc
        working-directory: .
        env:
          CANDIDATE: ${{ secrets.RPC_URL }}
        run: |
          PUB=https://rpc.mainnet.chain.robinhood.com
          CAND="$(printf %s "${CANDIDATE:-}" | tr -d '[:space:]')"
          URL="$PUB"
          if [ -n "$CAND" ]; then
            BODY='{"jsonrpc":"2.0","id":1,"method":"eth_getLogs","params":[{"address":"0x8366a39cc670b4001a1121b8f6a443a643e40951","fromBlock":"0xbc6b30","toBlock":"0xbd2f30"}]}'
            if curl -sf -m 15 -X POST -H 'content-type: application/json' --data "$BODY" "$CAND" | grep -q '"result"'; then
              URL="$CAND"
            else
              echo "::warning::RPC_URL secret failed the wide eth_getLogs capability probe (free-tier range cap?) — using the public RPC"
            fi
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
      - name: Vault strategy tick
        env:
          PONDER_RPC_URL_RH: ${{ steps.rpc.outputs.url }}
          PONDER_CHAIN_ID: "4663"
          FERA_START_BLOCK: "12347590"
          KEEPER_PRIVATE_KEY: ${{ secrets.KEEPER_PRIVATE_KEY }}
          # live mode only when the key is present; otherwise stays dry-run
          KEEPER_DRY_RUN: ${{ secrets.KEEPER_PRIVATE_KEY != '' && 'false' || 'true' }}
        # The tick is idempotent (simulate-first, fail-static), so retrying the whole run
        # on a transient RPC failure is safe — the public RPC drops connections sometimes.
        run: |
          for i in 1 2 3; do
            npm run keeper:vault && exit 0
            echo "::warning::keeper tick attempt $i failed — retrying in 20s (flaky RPC?)"
            sleep 20
          done
          exit 1
