# FERA vault-strategy keeper — free runner (GitHub Actions cron).
#
# PAUSED 2026-07-21: the scheduled trigger is disabled pending a fix. An adversarial audit
# found that `rebalanceLimit` (and related swap-free callbacks) close a band, read spot
# price, and mint a new band with ZERO TWAP/slippage re-validation — contrary to what this
# file's header used to claim. Combined with automatic, unvetted pool discovery (this
# keeper calls rebalanceLimit/rebalanceBase on EVERY pool it finds, including one an
# attacker could create with a deliberately reentrant native token), this is a live
# exposure for a fully-automated, unattended trigger. Manual runs (workflow_dispatch)
# remain available for the already-vetted 8 live pools while the fix lands.
#
# Every ~30 min (WHEN ENABLED): discovers the pools on-chain, then per seeded tranche
#   - recenters the base band ONLY if price has left it (position stopped earning)
#   - builds the idle reserve + deploys the limit band where one is missing
# Every action is SIMULATED first and sent only if the simulation succeeds, so a calm
# tick costs zero gas. Fail-static: a missed or late run just means positions hold.
#
# Setup (one-time), repo → Settings → Secrets and variables → Actions:
#   KEEPER_PRIVATE_KEY  = the FERA_VAULT_KEEPER hot key (bounded on-chain by design)
#   RPC_URL             = Alchemy Robinhood-Chain URL (recommended; falls back to public)
# Without KEEPER_PRIVATE_KEY the job still runs and logs what it WOULD do (dry run).
name: FERA keeper

on:
  # schedule:                    # PAUSED — see note above. Re-enable once the swap-free
  #   - cron: "0 * * * *"        # rebalance callbacks have a TWAP/slippage post-check
  #                              # and/or pool discovery is scoped to vetted native tokens.
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: fera-keeper
  cancel-in-progress: false

jobs:
  keeper:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      # The keeper needs WIDE address-scoped eth_getLogs (pool discovery + band
      # reconstruction). Free-tier RPC plans often cap getLogs at tiny block ranges, so
      # probe the secret endpoint's capability and fall back to the public RPC if it fails.
      - name: Resolve RPC
        id: rpc
        working-directory: .
        env:
          CANDIDATE: ${{ secrets.RPC_URL }}
        run: |
          PUB=https://rpc.mainnet.chain.robinhood.com
          CAND="$(printf %s "${CANDIDATE:-}" | tr -d '[:space:]')"
          URL="$PUB"
          if [ -n "$CAND" ]; then
            BODY='{"jsonrpc":"2.0","id":1,"method":"eth_getLogs","params":[{"address":"0x8366a39cc670b4001a1121b8f6a443a643e40951","fromBlock":"0xbc6b30","toBlock":"0xbd2f30"}]}'
            if curl -sf -m 15 -X POST -H 'content-type: application/json' --data "$BODY" "$CAND" | grep -q '"result"'; then
              URL="$CAND"
            else
              echo "::warning::RPC_URL secret failed the wide eth_getLogs capability probe (free-tier range cap?) — using the public RPC"
            fi
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
      - name: Vault strategy tick
        env:
          PONDER_RPC_URL_RH: ${{ steps.rpc.outputs.url }}
          PONDER_CHAIN_ID: "4663"
          FERA_START_BLOCK: "12347590"
          KEEPER_PRIVATE_KEY: ${{ secrets.KEEPER_PRIVATE_KEY }}
          # live mode only when the key is present; otherwise stays dry-run
          KEEPER_DRY_RUN: ${{ secrets.KEEPER_PRIVATE_KEY != '' && 'false' || 'true' }}
        # The tick is idempotent (simulate-first, fail-static), so retrying the whole run
        # on a transient RPC failure is safe — the public RPC drops connections sometimes.
        run: |
          for i in 1 2 3; do
            npm run keeper:vault && exit 0
            echo "::warning::keeper tick attempt $i failed — retrying in 20s (flaky RPC?)"
            sleep 20
          done
          exit 1
