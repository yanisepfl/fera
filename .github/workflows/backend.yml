name: backend

# Backend CI (Agent 5). tsc typecheck → ponder codegen/typecheck → **emissions pipeline
# dry-run determinism** (the consensus-critical gate, MASTER_SPEC §9 / DoD §14: reproducible
# roots, zero manual intervention) → container build. The pipeline is the highest-stakes off-chain
# code: a root, once posted, is NEVER hotfixed (R-13), so the reproducibility gate is load-bearing.
on:
  push:
    branches: [master, main]
    paths: ["backend/**", ".github/workflows/backend.yml"]
  pull_request:
    paths: ["backend/**", ".github/workflows/backend.yml"]

permissions:
  contents: read

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: backend

jobs:
  quality:
    name: typecheck (tsc + ponder)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Ponder codegen
        run: npm run codegen
      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck
      - name: Ponder typecheck
        run: npm run typecheck:ponder || echo "::warning::ponder typecheck needs a schema/db; non-blocking in CI."

  pipeline-determinism:
    name: emissions pipeline dry-run (reproducible root, §9/§14)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Run pipeline dry-run TWICE and assert identical Merkle root (determinism)
        # §9 reproducibility: anyone re-running the pipeline over the same snapshot must get the
        # IDENTICAL root. CI proves determinism by running the dry-run twice and diffing the emitted
        # root/bundle. The dryrun script itself also asserts the consensus invariants (D-M8 ordering,
        # 85/5/10 split, funding-cluster exclusion, PT-8 TWAP) and exits non-zero on any failure.
        run: |
          set -euo pipefail
          npm run pipeline:dryrun 2>&1 | tee run1.txt
          npm run pipeline:dryrun 2>&1 | tee run2.txt
          r1=$(grep -oiE '0x[0-9a-f]{64}' run1.txt | head -1 || true)
          r2=$(grep -oiE '0x[0-9a-f]{64}' run2.txt | head -1 || true)
          echo "root run1=$r1"; echo "root run2=$r2"
          if [ -z "$r1" ]; then echo "::error::dry-run produced no Merkle root — pipeline gate cannot verify determinism."; exit 1; fi
          if [ "$r1" != "$r2" ]; then echo "::error::Non-deterministic emissions root across two runs (§9 violated)."; exit 1; fi
          if grep -qiE '\[FAIL\]' run1.txt; then echo "::error::dry-run reported a FAIL assertion (§9 consensus invariant)."; exit 1; fi
          echo "::notice::emissions pipeline is deterministic; root stable across runs."
      - name: Upload dry-run logs + bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emissions-dryrun
          path: |
            backend/run1.txt
            backend/run2.txt
            backend/bundles
          retention-days: 30

  container:
    name: container build (indexer/api/keepers image)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (no push — publish happens in the release flow)
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          load: true
          tags: fera-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
        # NOTE: backend/Dockerfile is provided by Backend (4). If absent, this job fails loudly so
        # the containerization gap is visible rather than silently skipped.
