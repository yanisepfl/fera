# Daily FERA pool digest → Telegram. Free (GitHub Actions cron), zero infra.
#
# Setup (one-time):
#   1. Telegram: talk to @BotFather → /newbot → copy the token.
#   2. Send your new bot any message, then open
#      https://api.telegram.org/bot<TOKEN>/getUpdates and copy chat.id.
#   3. Repo → Settings → Secrets and variables → Actions → add:
#        TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID   (optionally RPC_URL = Alchemy)
#   4. Actions tab → "FERA pool digest" → Run workflow (manual test), then it runs daily.
name: FERA pool digest

on:
  schedule:
    - cron: "0 18 * * *" # daily 18:00 UTC
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: "Hours to cover"
        default: "24"
        required: false

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # The digest needs WIDE eth_getLogs; free-tier RPC plans cap the range. Probe the
      # secret endpoint's capability and fall back to the public RPC when it can't.
      - name: Resolve RPC
        id: rpc
        env:
          CANDIDATE: ${{ secrets.RPC_URL }}
        run: |
          PUB=https://rpc.mainnet.chain.robinhood.com
          CAND="$(printf %s "${CANDIDATE:-}" | tr -d '[:space:]')"
          URL="$PUB"
          if [ -n "$CAND" ]; then
            BODY='{"jsonrpc":"2.0","id":1,"method":"eth_getLogs","params":[{"address":"0x8366a39cc670b4001a1121b8f6a443a643e40951","fromBlock":"0xbc6b30","toBlock":"0xbd2f30"}]}'
            if curl -sf -m 15 -X POST -H 'content-type: application/json' --data "$BODY" "$CAND" | grep -q '"result"'; then
              URL="$CAND"
            else
              echo "::warning::RPC_URL secret failed the wide eth_getLogs capability probe (free-tier range cap?) — using the public RPC"
            fi
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
      - name: Send digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RPC_URL: ${{ steps.rpc.outputs.url }}
          LOOKBACK_HOURS: ${{ github.event.inputs.lookback_hours || '24' }}
        run: node ops/tracker.mjs
